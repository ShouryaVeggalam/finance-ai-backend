# Web service only — attach your EXISTING Postgres (and optional Redis) in the Render dashboard.
# Do NOT use Blueprint if you already have a database; use "New Web Service" instead.

services:
  - type: web
    name: finance-ai-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://finance-ai--dun.vercel.app
      # Set these in Render → Environment → paste your existing connection strings
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: OPENAI_API_KEY
        sync: false
