services:
  - type: web
    name: finance-ai-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: finance-ai-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: finance-ai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: finance-ai-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: finance-ai-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: finance-ai-redis
          type: redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://finance-ai--dun.vercel.app
      - key: OPENAI_API_KEY
        sync: false

  - type: redis
    name: finance-ai-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: finance-ai-db
    plan: free
    databaseName: celestra_finance
    user: celestra
